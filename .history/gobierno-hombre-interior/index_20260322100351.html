<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gobierno del Hombre Interior</title>

  <!-- IMPORTANTE PARA RUTAS -->
  <base href="./">

  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#0f172a">
</head>

<body>

  <!-- ============================= -->
  <!-- PANTALLA DE INICIO -->
  <!-- ============================= -->
  <section id="inicio" class="screen active">
    <div class="container center">
      <h1>EL GOBIERNO DEL HOMBRE INTERIOR</h1>
      <p class="sub">Del alma que sostiene al espíritu que entrega</p>

      <p class="frase">
        “El hombre no colapsa por lo que vive,  
        sino por dónde lo sostiene.”
      </p>

      <button onclick="irAEvaluacion()">Iniciar Evaluación</button>
      <button class="secondary" onclick="irALectura()">Leer Libro</button>
    </div>
  </section>

  <!-- ============================= -->
  <!-- EVALUACIÓN -->
  <!-- ============================= -->
  <section id="evaluacion" class="screen">
    <div class="container">

      <h2>Evaluación del Hombre Interior</h2>

      <input type="text" id="nombreUsuario" placeholder="Tu nombre">

      <div id="preguntasContainer"></div>

      <button onclick="calcularResultado()">Calcular Resultado</button>
      <button class="secondary" onclick="volverInicio()">Volver</button>

    </div>
  </section>

  <!-- ============================= -->
  <!-- RESULTADO -->
  <!-- ============================= -->
  <section id="resultado" class="screen">
    <div class="container">

      <h2>Resultado</h2>

      <div id="resultadoTexto"></div>

      <!-- PÓRTICO VISUAL -->
      <div id="porticoContainer">
        <svg id="porticoSvg" width="320" height="220">
          
          <!-- VIGA (ALMA) -->
          <rect id="viga" x="60" y="70" width="200" height="12" fill="#94a3b8"></rect>

          <!-- COLUMNA (ESPÍRITU) -->
          <rect id="columna" x="150" y="82" width="20" height="90" fill="#64748b"></rect>

          <!-- BASE (CRISTO) -->
          <rect x="110" y="170" width="100" height="12" fill="#334155"></rect>

          <!-- CARGA -->
          <circle id="carga" cx="160" cy="50" r="10" fill="#f59e0b"></circle>

        </svg>
      </div>

      <div id="detalleResultado"></div>

      <button onclick="volverInicio()">Finalizar</button>

    </div>
  </section>

  <!-- ============================= -->
  <!-- LECTOR DEL LIBRO -->
  <!-- ============================= -->
  <section id="lectura" class="screen">
    <div class="container">

      <h2>Lectura del Libro</h2>

      <div id="listaCapitulos"></div>

      <div id="contenidoCapitulo"></div>

      <button class="secondary" onclick="volverInicio()">Volver</button>

    </div>
  </section>

  <!-- ============================= -->
  <!-- SCRIPT -->
  <!-- ============================= -->
  <script src="app.js"></script>

</body>
</html>
