<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Victoriosos en Cristo</title>

    <link rel="icon"
    href="./assets/icons/favicon.png">

    <link rel="manifest"
    href="./pwa/manifest.json">

    <link rel="stylesheet"
    href="./css/styles.css">

    <link rel="stylesheet"
    href="./css/cards.css">

    <link rel="stylesheet"
    href="./css/animations.css">

    <link rel="stylesheet"
    href="./css/responsive.css">

</head>

<body>

    <header class="header">

        <img
        src="./assets/icons/logo.png"
        alt="Victoriosos en Cristo"
        class="logo-app">

    </header>

    <nav class="navbar">

        <a href="index.html">

            <img
            src="./assets/icons/home.png"
            alt="Inicio">

            <span>Inicio</span>

        </a>

        <a href="favoritos.html">

            <img
            src="./assets/icons/favorite.png"
            alt="Favoritos">

            <span>Favoritos</span>

        </a>

        <a href="audios.html">

            <img
            src="./assets/icons/play.png"
            alt="Audios">

            <span>Audios</span>

        </a>

        <a href="perfil.html">

            <img
            src="./assets/icons/profile.png"
            alt="Perfil">

            <span>Perfil</span>

        </a>

    </nav>

    <main class="container">

        <!-- =====================================
             ACCESO PRINCIPAL NECESITO ORACIÓN
        ====================================== -->
        <section class="home-oracion-acceso">

            <div class="home-oracion-icon">
                🙏
            </div>

            <div class="home-oracion-info">

                <span>
                    Acompañamiento espiritual
                </span>

                <h2>
                    Necesito oración
                </h2>

                <p>
                    Selecciona lo que estás viviendo y recibe una palabra, una oración y una declaración de fe.
                </p>

            </div>

            <a href="oracion.html"
            class="home-oracion-btn">
                Entrar
            </a>

        </section>

        <section id="categorias-container">

            <!-- Categorías dinámicas -->

        </section>

    </main>

    <!-- ======================================================
         MODAL PARA DESCARGAR PALABRA EN PDF
         Este modal será activado desde js/app.js
    ======================================================= -->
    <div class="modal-pdf-overlay"
    id="modalPdfPalabra"
    aria-hidden="true">

        <div class="modal-pdf-card">

            <button
            type="button"
            class="modal-pdf-cerrar"
            id="cerrarModalPdf"
            aria-label="Cerrar">
                ×
            </button>

            <div class="modal-pdf-header">

                <img
                src="./assets/icons/logo.png"
                alt="Victoriosos en Cristo"
                class="modal-pdf-logo">

                <div>

                    <h2>Enviar palabra en PDF</h2>

                    <p>
                        Personaliza esta palabra para bendecir a alguien.
                    </p>

                </div>

            </div>

            <form id="formPdfPalabra"
            class="modal-pdf-form">

                <label for="pdfNombrePersona">
                    Nombre de la persona
                </label>

                <input
                type="text"
                id="pdfNombrePersona"
                name="pdfNombrePersona"
                placeholder="Ejemplo: Ana, Carlos, mi amiga..."
                autocomplete="off"
                required>

                <label for="pdfDedicatoria">
                    Dedicatoria
                </label>

                <textarea
                id="pdfDedicatoria"
                name="pdfDedicatoria"
                rows="5"
                placeholder="Escribe aquí unas palabras personales de ánimo, fe y cariño..."
                required></textarea>

                <input
                type="hidden"
                id="pdfTituloPalabra">

                <input
                type="hidden"
                id="pdfTextoPalabra">

                <input
                type="hidden"
                id="pdfVersiculoPalabra">

                <input
                type="hidden"
                id="pdfDeclaracionPalabra">

                <div class="modal-pdf-actions">

                    <button
                    type="button"
                    class="btn-pdf-secundario"
                    id="cancelarPdfPalabra">
                        Cancelar
                    </button>

                    <button
                    type="submit"
                    class="btn-pdf-principal">
                        Descargar PDF
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Librería para generar PDF desde el navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="./js/app.js"></script>

    <script>

        if('serviceWorker' in navigator){

            navigator.serviceWorker.register(
                './pwa/service-worker.js'
            );

        }

    </script>

</body>

</html>
